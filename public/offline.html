<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline — WebMech</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0f172a;
        color: #e2e8f0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        text-align: center;
        padding: 24px;
      }
      .card { max-width: 360px; }
      h1 { font-size: 1.5rem; margin: 0 0 8px; }
      p { color: #94a3b8; line-height: 1.5; margin: 0 0 20px; }
      button {
        background: #f59e0b;
        color: #0f172a;
        border: 0;
        border-radius: 8px;
        padding: 12px 20px;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
      }
      .logo { font-weight: 800; letter-spacing: -0.02em; font-size: 1.1rem; margin-bottom: 24px; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">WebMech</div>
      <h1>You're offline</h1>
      <p>
        We can't reach the network right now. Check your connection — your
        request and live tracking will resume once you're back online.
      </p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
